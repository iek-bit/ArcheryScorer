<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scoresheet Scanner Test</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #0a0f1a;
      color: #e8eaf0;
    }
    h1 { color: #e8c547; }
    .test-section {
      background: #111827;
      border: 1px solid #2a3a50;
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
    }
    button {
      background: #e8c547;
      color: #000;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px 10px 10px 0;
    }
    button:hover { opacity: 0.9; }
    canvas {
      max-width: 100%;
      border: 1px solid #2a3a50;
      border-radius: 8px;
      margin: 10px 0;
    }
    .score-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
      gap: 8px;
      margin: 10px 0;
    }
    .score-cell {
      background: #1e2a3a;
      padding: 8px;
      border-radius: 4px;
      text-align: center;
      font-family: monospace;
    }
    input[type="file"] {
      margin: 10px 0;
      color: #e8eaf0;
    }
    pre {
      background: #0a0f1a;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>🎯 Scoresheet Scanner Test</h1>
  
  <div class="test-section">
    <h2>1. Upload Scorecard Image</h2>
    <input type="file" id="fileInput" accept="image/*">
    <button onclick="processImage()">Process Image</button>
  </div>

  <div class="test-section">
    <h2>2. Original Image</h2>
    <canvas id="originalCanvas"></canvas>
  </div>

  <div class="test-section">
    <h2>3. Cropped Scorecard</h2>
    <canvas id="croppedCanvas"></canvas>
  </div>

  <div class="test-section">
    <h2>4. Detected Scores</h2>
    <div id="scoresOutput"></div>
    <pre id="scoresJson"></pre>
  </div>

  <script>
    let originalImage = null;

    document.getElementById('fileInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          originalImage = img;
          displayOriginalImage(img);
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    function displayOriginalImage(img) {
      const canvas = document.getElementById('originalCanvas');
      const ctx = canvas.getContext('2d');
      const maxWidth = 600;
      const scale = Math.min(1, maxWidth / img.width);
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    }

    async function processImage() {
      if (!originalImage) {
        alert('Please upload an image first');
        return;
      }

      // Create full-size canvas
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = originalImage.width;
      canvas.height = originalImage.height;
      ctx.drawImage(originalImage, 0, 0);

      // Crop the scorecard
      const croppedCanvas = await detectAndCropScorecard(canvas);
      
      // Display cropped image
      const displayCanvas = document.getElementById('croppedCanvas');
      const displayCtx = displayCanvas.getContext('2d');
      const maxWidth = 600;
      const scale = Math.min(1, maxWidth / croppedCanvas.width);
      displayCanvas.width = croppedCanvas.width * scale;
      displayCanvas.height = croppedCanvas.height * scale;
      displayCtx.drawImage(croppedCanvas, 0, 0, displayCanvas.width, displayCanvas.height);

      // Detect scores
      const scores = await detectBubbleScores(croppedCanvas);
      
      // Draw debug overlay
      const debugInfo = window.scoresheetDebugInfo;
      if (debugInfo) {
        displayCtx.strokeStyle = 'rgba(232, 197, 71, 0.8)';
        displayCtx.fillStyle = 'rgba(232, 197, 71, 0.3)';
        displayCtx.lineWidth = 2 * scale;
        
        debugInfo.forEach((endDebug) => {
          endDebug.forEach((rowDebug) => {
            rowDebug.bubbles.forEach(bubble => {
              if (bubble.filled) {
                displayCtx.beginPath();
                displayCtx.arc(bubble.x * scale, bubble.y * scale, bubble.radius * scale, 0, Math.PI * 2);
                displayCtx.fill();
                displayCtx.stroke();
                
                displayCtx.fillStyle = '#000';
                displayCtx.font = `bold ${bubble.radius * scale}px sans-serif`;
                displayCtx.textAlign = 'center';
                displayCtx.textBaseline = 'middle';
                displayCtx.fillText(bubble.score, bubble.x * scale, bubble.y * scale);
                displayCtx.fillStyle = 'rgba(232, 197, 71, 0.3)';
              }
            });
          });
        });
        
        // Draw row dividers
        displayCtx.strokeStyle = 'rgba(82, 194, 120, 0.5)';
        displayCtx.lineWidth = 1;
        const numEnds = 6;
        const endHeight = croppedCanvas.height / numEnds;
        
        for (let endIdx = 0; endIdx < numEnds; endIdx++) {
          const endTop = endIdx * endHeight;
          const endBottom = (endIdx + 1) * endHeight;
          const rowHeight = (endBottom - endTop) / 5;
          
          displayCtx.strokeStyle = 'rgba(59, 130, 246, 0.7)';
          displayCtx.lineWidth = 2;
          displayCtx.beginPath();
          displayCtx.moveTo(0, endTop * scale);
          displayCtx.lineTo(displayCanvas.width, endTop * scale);
          displayCtx.stroke();
          
          displayCtx.strokeStyle = 'rgba(82, 194, 120, 0.4)';
          displayCtx.lineWidth = 1;
          for (let rowIdx = 1; rowIdx < 5; rowIdx++) {
            const rowY = endTop + rowIdx * rowHeight;
            displayCtx.beginPath();
            displayCtx.moveTo(0, rowY * scale);
            displayCtx.lineTo(displayCanvas.width, rowY * scale);
            displayCtx.stroke();
          }
        }
      }
      
      displayScores(scores);
    }

    async function detectAndCropScorecard(canvas) {
      const ctx = canvas.getContext('2d');
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      
      let leftEdge = 0;
      let rightEdge = canvas.width;
      let topEdge = 0;
      let bottomEdge = canvas.height;
      
      const darkThreshold = 80;
      const leftScanWidth = Math.floor(canvas.width * 0.15);
      
      let darkColumns = [];
      for (let x = 0; x < leftScanWidth; x++) {
        let darkPixels = 0;
        for (let y = 0; y < canvas.height; y++) {
          const idx = (y * canvas.width + x) * 4;
          const brightness = (data[idx] + data[idx + 1] + data[idx + 2]) / 3;
          if (brightness < darkThreshold) darkPixels++;
        }
        if (darkPixels > canvas.height * 0.3) {
          darkColumns.push(x);
        }
      }
      
      if (darkColumns.length > 0) {
        leftEdge = Math.min(...darkColumns);
      }
      
      const rightScanStart = Math.floor(canvas.width * 0.7);
      for (let x = canvas.width - 1; x > rightScanStart; x--) {
        let darkPixels = 0;
        for (let y = 0; y < canvas.height; y++) {
          const idx = (y * canvas.width + x) * 4;
          const brightness = (data[idx] + data[idx + 1] + data[idx + 2]) / 3;
          if (brightness < 200) darkPixels++;
        }
        if (darkPixels > canvas.height * 0.1) {
          rightEdge = x + Math.floor(canvas.width * 0.05);
          break;
        }
      }
      
      for (let y = 0; y < canvas.height; y++) {
        let darkPixels = 0;
        for (let x = leftEdge; x < rightEdge; x++) {
          const idx = (y * canvas.width + x) * 4;
          const brightness = (data[idx] + data[idx + 1] + data[idx + 2]) / 3;
          if (brightness < 200) darkPixels++;
        }
        if (darkPixels > (rightEdge - leftEdge) * 0.1) {
          topEdge = Math.max(0, y - 10);
          break;
        }
      }
      
      for (let y = canvas.height - 1; y > 0; y--) {
        let darkPixels = 0;
        for (let x = leftEdge; x < rightEdge; x++) {
          const idx = (y * canvas.width + x) * 4;
          const brightness = (data[idx] + data[idx + 1] + data[idx + 2]) / 3;
          if (brightness < 200) darkPixels++;
        }
        if (darkPixels > (rightEdge - leftEdge) * 0.1) {
          bottomEdge = Math.min(canvas.height, y + 10);
          break;
        }
      }
      
      const croppedCanvas = document.createElement('canvas');
      const croppedWidth = rightEdge - leftEdge;
      const croppedHeight = bottomEdge - topEdge;
      croppedCanvas.width = croppedWidth;
      croppedCanvas.height = croppedHeight;
      const croppedCtx = croppedCanvas.getContext('2d');
      croppedCtx.drawImage(canvas, leftEdge, topEdge, croppedWidth, croppedHeight, 0, 0, croppedWidth, croppedHeight);
      
      return croppedCanvas;
    }

    async function detectBubbleScores(canvas) {
      const ctx = canvas.getContext('2d');
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      
      const scores = [];
      const debugInfo = [];
      const numEnds = 6;
      const endHeight = canvas.height / numEnds;
      
      for (let endIdx = 0; endIdx < numEnds; endIdx++) {
        const endScores = [];
        const endDebug = [];
        const endTop = endIdx * endHeight;
        const endBottom = (endIdx + 1) * endHeight;
        const rowHeight = (endBottom - endTop) / 5;
        
        for (let rowIdx = 0; rowIdx < 5; rowIdx++) {
          const rowTop = endTop + rowIdx * rowHeight;
          const rowBottom = endTop + (rowIdx + 1) * rowHeight;
          const rowMiddle = (rowTop + rowBottom) / 2;
          
          const bubbleStartX = Math.floor(canvas.width * 0.25);
          const bubbleEndX = Math.floor(canvas.width * 0.95);
          const bubbleWidth = (bubbleEndX - bubbleStartX) / 11;
          
          const filledBubbles = [];
          const bubbleDebug = [];
          
          for (let bubbleIdx = 0; bubbleIdx <= 10; bubbleIdx++) {
            const bubbleX = bubbleStartX + bubbleIdx * bubbleWidth + bubbleWidth / 2;
            const bubbleY = rowMiddle;
            
            const sampleRadius = Math.floor(Math.min(bubbleWidth, rowHeight) * 0.2);
            const innerRadius = Math.floor(sampleRadius * 0.5);
            
            // Sample background
            let bgBrightness = 0;
            let bgSamples = 0;
            const bgRadius = sampleRadius * 1.8;
            
            for (let angle = 0; angle < Math.PI * 2; angle += Math.PI / 4) {
              const bgX = Math.floor(bubbleX + Math.cos(angle) * bgRadius);
              const bgY = Math.floor(bubbleY + Math.sin(angle) * bgRadius);
              if (bgX >= 0 && bgX < canvas.width && bgY >= 0 && bgY < canvas.height) {
                const idx = (bgY * canvas.width + bgX) * 4;
                bgBrightness += (data[idx] + data[idx + 1] + data[idx + 2]) / 3;
                bgSamples++;
              }
            }
            bgBrightness = bgSamples > 0 ? bgBrightness / bgSamples : 240;
            
            // Sample bubble area
            let centerDarkPixels = 0, centerTotal = 0;
            let ringDarkPixels = 0, ringTotal = 0;
            let totalBrightness = 0;
            
            for (let dy = -sampleRadius; dy <= sampleRadius; dy++) {
              for (let dx = -sampleRadius; dx <= sampleRadius; dx++) {
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance > sampleRadius) continue;
                
                const checkX = Math.floor(bubbleX + dx);
                const checkY = Math.floor(bubbleY + dy);
                if (checkX >= 0 && checkX < canvas.width && checkY >= 0 && checkY < canvas.height) {
                  const idx = (checkY * canvas.width + checkX) * 4;
                  const brightness = (data[idx] + data[idx + 1] + data[idx + 2]) / 3;
                  totalBrightness += brightness;
                  
                  const isDark = brightness < (bgBrightness - 30);
                  
                  if (distance <= innerRadius) {
                    centerTotal++;
                    if (isDark) centerDarkPixels++;
                  } else {
                    ringTotal++;
                    if (isDark) ringDarkPixels++;
                  }
                }
              }
            }
            
            const centerFillRatio = centerTotal > 0 ? centerDarkPixels / centerTotal : 0;
            const ringFillRatio = ringTotal > 0 ? ringDarkPixels / ringTotal : 0;
            const avgBrightness = (centerTotal + ringTotal) > 0 ? totalBrightness / (centerTotal + ringTotal) : 240;
            const contrastRatio = (bgBrightness - avgBrightness) / bgBrightness;
            
            const isFilled = (
              centerFillRatio > 0.25 || 
              (ringFillRatio > 0.20 && contrastRatio > 0.15) ||
              (centerFillRatio > 0.15 && ringFillRatio > 0.15)
            );
            
            if (isFilled) {
              filledBubbles.push(bubbleIdx);
            }
            
            bubbleDebug.push({
              x: bubbleX,
              y: bubbleY,
              radius: sampleRadius,
              filled: isFilled,
              centerFill: centerFillRatio,
              ringFill: ringFillRatio,
              contrast: contrastRatio,
              score: bubbleIdx
            });
          }
          
          const score = filledBubbles.length > 0 ? Math.min(...filledBubbles) : 0;
          endScores.push(score);
          endDebug.push({
            rowY: rowMiddle,
            bubbles: bubbleDebug,
            detectedScore: score,
            allFilled: filledBubbles
          });
        }
        
        scores.push(endScores);
        debugInfo.push(endDebug);
      }
      
      window.scoresheetDebugInfo = debugInfo;
      return scores;
    }

    function displayScores(scores) {
      let html = '';
      let totalScore = 0;
      
      for (let endIdx = 0; endIdx < scores.length; endIdx++) {
        const endScores = scores[endIdx];
        const endTotal = endScores.reduce((a, b) => a + b, 0);
        totalScore += endTotal;
        
        html += `<h3>End ${endIdx + 1} (${endIdx < 3 ? '10m' : '15m'}): ${endTotal}</h3>`;
        html += '<div class="score-grid">';
        endScores.forEach((score, idx) => {
          html += `<div class="score-cell">Arrow ${idx + 1}: <strong>${score}</strong></div>`;
        });
        html += '</div>';
      }
      
      html += `<h2 style="color: #e8c547;">Total Score: ${totalScore}</h2>`;
      
      document.getElementById('scoresOutput').innerHTML = html;
      document.getElementById('scoresJson').textContent = JSON.stringify(scores, null, 2);
    }
  </script>
</body>
</html>
