name: Add Score via Dispatch

on:
  repository_dispatch:
    types: [add-score]

jobs:
  add-score:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ARCHERY_TOKEN }}
      
      - name: Add score to scores.json
        run: |
          python3 << 'EOF'
          import json
          import sys
          from datetime import datetime
          
          # Get session data from event payload
          session_json = '''${{ toJson(github.event.client_payload.session) }}'''
          
          try:
            session = json.loads(session_json)
            
            # Load scores.json
            try:
              with open('scores.json', 'r') as f:
                data = json.load(f)
            except FileNotFoundError:
              data = {'version': '1.0', 'lastUpdated': '', 'sessions': []}
            
            # Check for duplicates
            existing_ids = [s.get('sessionId') for s in data.get('sessions', [])]
            if session.get('sessionId') not in existing_ids:
              data['sessions'].append(session)
              data['lastUpdated'] = datetime.utcnow().isoformat() + 'Z'
              
              with open('scores.json', 'w') as f:
                json.dump(data, f, indent=2)
              print(f"Added score from {session.get('archerName', 'Unknown')}")
            else:
              print("Score already exists")
          except Exception as e:
            print(f"Error: {e}")
            sys.exit(1)
          EOF
      
      - name: Commit changes
        run: |
          git config user.name "Archery Bot"
          git config user.email "bot@archery.local"
          git add scores.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add score from ${{ github.event.client_payload.archer_name }}"
            git push
          fi
